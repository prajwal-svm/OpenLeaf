# cargo-deny policy: RustSec advisories and a permissive-only license gate
# (the app bundles its dependencies into a shipped desktop binary).
# Run: cargo deny check  (from src-tauri/)

[graph]
all-features = false

[advisories]
yanked = "warn"
# Everything ignored below is transitively pinned by Tauri itself and has no
# upstream fix we can adopt; Dependabot resurfaces them when Tauri moves.
ignore = [
  # gtk-rs GTK3 bindings are unmaintained; Tauri's Linux backend still
  # requires GTK3 until its GTK4/wry migration lands.
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  # proc-macro-error unmaintained (via gtk3 macro stack).
  "RUSTSEC-2024-0370",
  # unic-* unmaintained (transitive; no maintained replacement in the chain).
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
  # quick-xml DoS advisories; fixed in 0.41 but plist (via tauri) pins 0.39,
  # and plist only parses local files here, not attacker-controlled XML.
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0",
  "0BSD",
  "CC0-1.0",
  "MPL-2.0",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = [
  { allow = ["AGPL-3.0-or-later"], crate = "oleafly" },
]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
