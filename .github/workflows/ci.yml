name: CI

# Docs-only changes skip CI entirely: a push here also CANCELS any in-flight
# run on the same ref (concurrency group), so letting a README tweak through
# would kill a 30-minute three-platform e2e round.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "docsite/**"
      - ".github/badges/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "docsite/**"
      - ".github/badges/**"
  # Manual trigger for the on-demand macOS/Windows e2e jobs (see their `if:`).
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-platform-smoke:
    name: Markdown smoke (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7
      - name: Fetch Tectonic sidecar
        run: bash scripts/fetch-tectonic.sh ${{ matrix.target }}
      - name: Smoke-test managed Pandoc with packaged Tectonic input
        run: bash scripts/smoke-markdown.sh ${{ matrix.target }}

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        # Version comes from the `packageManager` field in package.json, so CI
        # matches local + the lockfile generator. (pnpm 9 mis-parses the
        # settings-only pnpm-workspace.yaml as an empty workspace.)
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          # pnpm 11 requires Node >= 22.13; keep this at 22+ (see package.json
          # `packageManager`). Node 20 crashes pnpm's `store path` lookup.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      # Biome lint gate. Blocks on correctness errors; the existing a11y/style
      # backlog is reported as (non-blocking) warnings. See biome.json.
      - name: Lint
        run: pnpm lint

      # `pnpm build` runs `tsc -b` (typecheck) then `vite build` (bundle). The
      # frontend build needs no Tectonic sidecar.
      - name: Typecheck & build
        run: pnpm build
      - name: Check performance budgets
        run: pnpm check:performance

      # Unit tests for the LaTeX masking (spell/grammar false-positive coverage).
      - name: Test
        run: pnpm test

  rust:
    name: Rust (test + clippy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # The Tauri build verifies the configured `externalBin` sidecar exists for
      # the host target, so fetch it before compiling. Cached across runs.
      - name: Cache Tectonic sidecar
        id: cache-tectonic
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/tectonic-*
          key: tectonic-${{ runner.os }}-${{ hashFiles('scripts/fetch-tectonic.sh') }}

      - name: Fetch Tectonic sidecar
        if: steps.cache-tectonic.outputs.cache-hit != 'true'
        run: bash scripts/fetch-tectonic.sh x86_64-unknown-linux-gnu

      - name: Cache Typst sidecar
        id: cache-typst
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/typst-*
          key: typst-${{ runner.os }}-${{ hashFiles('scripts/fetch-typst.sh') }}

      - name: Fetch Typst sidecar
        if: steps.cache-typst.outputs.cache-hit != 'true'
        run: bash scripts/fetch-typst.sh x86_64-unknown-linux-gnu

      - name: Smoke-test Typst sidecar
        run: bash scripts/smoke-typst.sh x86_64-unknown-linux-gnu

      - name: Smoke-test managed Pandoc with bundled Tectonic
        run: bash scripts/smoke-markdown.sh x86_64-unknown-linux-gnu

      - name: Test
        working-directory: src-tauri
        run: cargo test --lib

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  cargo-deny:
    # RustSec advisories plus a permissive-only license gate for everything
    # compiled into the shipped binary. Policy lives in src-tauri/deny.toml.
    name: Rust (cargo-deny audit)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check

  e2e:
    # The full no-mock suite against the real app (WKWebView + Rust + Tectonic
    # compiles) on macOS. Tests that need credentials (GitHub PAT, AI keys) skip
    # automatically when their E2E_* env vars are absent, so CI runs the ungated
    # tests.
    #
    # On-demand only (Actions -> CI -> Run workflow): pdf.js does not composite
    # its canvas in the headless CI WKWebView (the window is occluded, so
    # rendering is throttled), so the PDF-preview tests fail here even though
    # every other UI test passes and the same suite is green on Linux (xvfb) and
    # locally. Running it per-push would surface a permanently-red check, so it
    # is gated to manual dispatch rather than gating (or cluttering) the branch.
    if: github.event_name == 'workflow_dispatch'
    name: E2E (real app, macOS)
    runs-on: macos-14
    # Hard ceiling well under the job cap: a systemically broken environment
    # (e.g. the webview failing to start) must fail fast, not burn billed
    # macOS minutes timing out 118 tests one by one.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache Tectonic sidecar
        id: cache-tectonic-e2e
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/tectonic-*
          key: tectonic-${{ runner.os }}-${{ hashFiles('scripts/fetch-tectonic.sh') }}

      - name: Fetch Tectonic sidecar
        if: steps.cache-tectonic-e2e.outputs.cache-hit != 'true'
        run: bash scripts/fetch-tectonic.sh aarch64-apple-darwin

      - name: Cache Typst sidecar
        id: cache-typst-e2e
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/typst-*
          key: typst-${{ runner.os }}-${{ hashFiles('scripts/fetch-typst.sh') }}

      - name: Fetch Typst sidecar
        if: steps.cache-typst-e2e.outputs.cache-hit != 'true'
        run: bash scripts/fetch-typst.sh aarch64-apple-darwin

      - name: Smoke-test Typst sidecar
        run: bash scripts/smoke-typst.sh aarch64-apple-darwin

      # First compiles fetch LaTeX packages over the network, so the suite's
      # early compiles time out if the runner's Tectonic cache is cold. Restore
      # it, then pre-warm by compiling every bundled template with the sidecar.
      # Pre-warm runs UNCONDITIONALLY (not just on a cache miss): a past failing
      # run can save an incomplete cache that later "hits" but still leaves the
      # app compiling cold, so we always warm the live cache before the suite.
      - name: Restore Tectonic packages
        id: tectonic-pkgs
        uses: actions/cache/restore@v6
        with:
          path: ~/Library/Caches/Tectonic
          key: tectonic-pkgs-v2-${{ runner.os }}-${{ hashFiles('src-tauri/resources/templates/**/main.tex') }}
          restore-keys: tectonic-pkgs-v2-${{ runner.os }}-

      - name: Pre-warm the Tectonic package cache
        run: |
          BIN="$PWD/src-tauri/binaries/tectonic-aarch64-apple-darwin"
          mkdir -p /tmp/prewarm
          for f in src-tauri/resources/templates/*/main.tex; do
            (cd "$(dirname "$f")" && "$BIN" -o /tmp/prewarm main.tex) || true
          done

      - name: Save Tectonic packages
        if: steps.tectonic-pkgs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/Library/Caches/Tectonic
          key: tectonic-pkgs-v2-${{ runner.os }}-${{ hashFiles('src-tauri/resources/templates/**/main.tex') }}

      # The fixture machinery needs a Playwright browser even in tauri mode.
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run the e2e suite
        # --max-failures stops a systemically broken run early;
        # --global-timeout bounds the whole suite to ~40 minutes.
        run: ./scripts/e2e.sh --max-failures=10 --global-timeout=2400000

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-macos
          # Only the small, useful debugging files. Avoids uploading the macOS
          # driver's ~1 GB per-run screencast blob that lives under test-results/.
          path: |
            test-results/**/error-context.md
            test-results/**/trace.zip
            test-results/**/*.log
          retention-days: 7
          if-no-files-found: ignore

  e2e-linux:
    # The same no-mock suite on Linux (WebKitGTK + Rust + Tectonic). The
    # socket bridge, hermetic data dir, and shortcut handling are all
    # platform-neutral; the app runs under xvfb.
    name: E2E (real app, Linux)
    # 24.04, not 22.04: the upstream Tectonic release binary needs glibc 2.39.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux system dependencies (Tauri + xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            xvfb \
            curl wget file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache Tectonic sidecar
        id: cache-tectonic-e2e-linux
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/tectonic-*
          key: tectonic-${{ runner.os }}-${{ hashFiles('scripts/fetch-tectonic.sh') }}

      - name: Fetch Tectonic sidecar
        if: steps.cache-tectonic-e2e-linux.outputs.cache-hit != 'true'
        run: bash scripts/fetch-tectonic.sh x86_64-unknown-linux-gnu

      - name: Cache Typst sidecar
        id: cache-typst-e2e-linux
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/typst-*
          key: typst-${{ runner.os }}-${{ hashFiles('scripts/fetch-typst.sh') }}

      - name: Fetch Typst sidecar
        if: steps.cache-typst-e2e-linux.outputs.cache-hit != 'true'
        run: bash scripts/fetch-typst.sh x86_64-unknown-linux-gnu

      - name: Smoke-test Typst sidecar
        run: bash scripts/smoke-typst.sh x86_64-unknown-linux-gnu

      - name: Restore Tectonic packages
        id: tectonic-pkgs-linux
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/Tectonic
          key: tectonic-pkgs-v2-${{ runner.os }}-${{ hashFiles('src-tauri/resources/templates/**/main.tex') }}
          restore-keys: tectonic-pkgs-v2-${{ runner.os }}-

      - name: Pre-warm the Tectonic package cache
        run: |
          BIN="$PWD/src-tauri/binaries/tectonic-x86_64-unknown-linux-gnu"
          mkdir -p /tmp/prewarm
          for f in src-tauri/resources/templates/*/main.tex; do
            (cd "$(dirname "$f")" && "$BIN" -o /tmp/prewarm main.tex) || true
          done

      - name: Save Tectonic packages
        if: steps.tectonic-pkgs-linux.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.cache/Tectonic
          key: tectonic-pkgs-v2-${{ runner.os }}-${{ hashFiles('src-tauri/resources/templates/**/main.tex') }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run the e2e suite
        # WEBKIT_DISABLE_* work around webkit2gtk rendering hangs on the
        # software GL stack xvfb provides.
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: xvfb-run -a ./scripts/e2e.sh --max-failures=10 --global-timeout=2400000

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-linux
          # Only the small, useful debugging files. Avoids uploading the macOS
          # driver's ~1 GB per-run screencast blob that lives under test-results/.
          path: |
            test-results/**/error-context.md
            test-results/**/trace.zip
            test-results/**/*.log
          retention-days: 7
          if-no-files-found: ignore

  e2e-windows:
    # The same suite on Windows (WebView2 + Rust + Tectonic). The plugin
    # serves TCP there (no unix sockets); e2e/fixtures.ts connects over TCP
    # via its own fixture, and scripts/e2e.ps1 is the launcher.
    #
    # On-demand only, same reason as macOS: pdf.js does not composite its canvas
    # in the headless CI WebView2, so the PDF-preview tests fail here while the
    # suite is green on Linux and locally. Gated to manual dispatch so it never
    # surfaces a permanently-red check on a commit.
    if: github.event_name == 'workflow_dispatch'
    name: E2E (real app, Windows)
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache Tectonic sidecar
        id: cache-tectonic-e2e-windows
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/tectonic-*
          key: tectonic-${{ runner.os }}-${{ hashFiles('scripts/fetch-tectonic.sh') }}

      - name: Fetch Tectonic sidecar
        if: steps.cache-tectonic-e2e-windows.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/fetch-tectonic.sh x86_64-pc-windows-msvc

      - name: Cache Typst sidecar
        id: cache-typst-e2e-windows
        uses: actions/cache@v6
        with:
          path: src-tauri/binaries/typst-*
          key: typst-${{ runner.os }}-${{ hashFiles('scripts/fetch-typst.sh') }}

      - name: Fetch Typst sidecar
        if: steps.cache-typst-e2e-windows.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/fetch-typst.sh x86_64-pc-windows-msvc

      - name: Smoke-test Typst sidecar
        shell: bash
        run: bash scripts/smoke-typst.sh x86_64-pc-windows-msvc

      - name: Restore Tectonic packages
        id: tectonic-pkgs-windows
        uses: actions/cache/restore@v6
        with:
          path: ~\AppData\Local\TectonicProject
          key: tectonic-pkgs-v2-${{ runner.os }}-${{ hashFiles('src-tauri/resources/templates/**/main.tex') }}
          restore-keys: tectonic-pkgs-v2-${{ runner.os }}-

      - name: Pre-warm the Tectonic package cache
        shell: bash
        run: |
          BIN="$PWD/src-tauri/binaries/tectonic-x86_64-pc-windows-msvc.exe"
          mkdir -p /tmp/prewarm
          for f in src-tauri/resources/templates/*/main.tex; do
            (cd "$(dirname "$f")" && "$BIN" -o /tmp/prewarm main.tex) || true
          done

      - name: Save Tectonic packages
        if: steps.tectonic-pkgs-windows.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~\AppData\Local\TectonicProject
          key: tectonic-pkgs-v2-${{ runner.os }}-${{ hashFiles('src-tauri/resources/templates/**/main.tex') }}

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run the e2e suite
        shell: pwsh
        run: powershell -File scripts/e2e.ps1 --max-failures=10 --global-timeout=2400000

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-windows
          # Only the small, useful debugging files. Avoids uploading the macOS
          # driver's ~1 GB per-run screencast blob that lives under test-results/.
          path: |
            test-results/**/error-context.md
            test-results/**/trace.zip
            test-results/**/*.log
          retention-days: 7
          if-no-files-found: ignore
