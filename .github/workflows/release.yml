name: Release

#
#     git tag v0.1.0 && git push origin v0.1.0
#
# or run manually from the Actions tab (provide the tag to attach to). The
# release is created as a DRAFT so a maintainer can review the notes and the
# attached artifacts before publishing.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build & attach the release to (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write # tauri-action needs this to create the release & upload assets

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-14
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: Linux (x86_64)
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: ""
          - name: Windows (x86_64)
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system dependencies (Tauri)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file

      - name: Install pnpm
        # Version comes from the `packageManager` field in package.json.
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          # pnpm 11 requires Node >= 22.13 (see package.json `packageManager`).
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fetch the Tectonic LaTeX-compiler sidecar for the build target. Tauri
      # bundles it (bundle.externalBin) so the shipped app compiles offline.
      - name: Fetch checksum-pinned Tectonic sidecar
        shell: bash
        run: bash scripts/fetch-tectonic.sh ${{ matrix.rust_target }}

      - name: Fetch Typst sidecar
        shell: bash
        run: bash scripts/fetch-typst.sh ${{ matrix.rust_target }}

      - name: Smoke-test Typst sidecar
        shell: bash
        run: bash scripts/smoke-typst.sh ${{ matrix.rust_target }}

      - name: Smoke-test managed Pandoc with packaged Tectonic input
        shell: bash
        run: bash scripts/smoke-markdown.sh ${{ matrix.rust_target }}

      # Build the release notes from CHANGELOG.md so both the GitHub Release and
      # the updater's `notes` say what changed (install help is a link, not the
      # headline). tauri-action copies `releaseBody` into `latest.json`.
      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          {
            echo 'body<<CHANGELOG_EOF'
            echo "## What's new in ${VERSION#v}"
            echo ""
            bash scripts/changelog-extract.sh "$VERSION"
            echo ""
            echo "---"
            echo ""
            echo "**Downloads:** grab your platform's installer below (macOS \`aarch64\` \`.dmg\`, Windows \`.msi\` / \`-setup.exe\`, Linux \`.AppImage\` / \`.deb\`)."
            echo ""
            echo "First launch on macOS or Windows? These builds aren't code-signed yet: follow the [one-time unlock steps](https://github.com/prajwal-svm/OpenLeaf/blob/main/docs/install.md#first-launch)."
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build & release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and generates `latest.json`. Set these
          # repo secrets (see docs/updates.md); without them the build still
          # succeeds but produces no auto-update feed.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Oleafly ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify staged runtime sidecars are sibling-resolvable
        shell: bash
        run: |
          if [[ "${{ matrix.rust_target }}" == "aarch64-apple-darwin" ]]; then
            RUNTIME_DIR="src-tauri/target/${{ matrix.rust_target }}/release"
            test -f "$RUNTIME_DIR/tectonic"
            test -f "$RUNTIME_DIR/typst"
          elif [[ "${{ matrix.rust_target }}" == *windows* ]]; then
            RUNTIME_DIR="src-tauri/target/release"
            test -f "$RUNTIME_DIR/tectonic.exe"
            test -f "$RUNTIME_DIR/typst.exe"
          else
            RUNTIME_DIR="src-tauri/target/release"
            test -f "$RUNTIME_DIR/tectonic"
            test -f "$RUNTIME_DIR/typst"
          fi
