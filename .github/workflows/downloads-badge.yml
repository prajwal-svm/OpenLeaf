name: Downloads badge

# Publishes an honest installer-download count for the README badge: the raw
# GitHub total is dominated by latest.json fetches (every running app polls it
# to check for updates) and .sig files (fetched by the updater), so this sums
# release assets excluding both and writes a shields.io endpoint JSON to the
# orphan `badges` branch.
on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Compute installer downloads and publish the badge JSON
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          total=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '[.[].assets[] | select(.name != "latest.json") | select(.name | endswith(".sig") | not) | .download_count] | add // 0')
          printf '{"schemaVersion":1,"label":"Downloads","message":"%s","color":"22c55e"}\n' "$total" > /tmp/downloads.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin badges >/dev/null 2>&1; then
            git fetch origin badges
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp /tmp/downloads.json downloads.json
          git add downloads.json
          git commit -m "update downloads badge" || exit 0
          git push origin badges
