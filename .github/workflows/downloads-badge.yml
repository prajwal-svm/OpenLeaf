name: Downloads badge

# Publishes an honest installer-download count for the README badge: the raw
# GitHub total is dominated by latest.json fetches (every running app polls it
# to check for updates) and .sig files (fetched by the updater), so this sums
# release assets excluding both. The shields.io endpoint JSON lives on main at
# .github/badges/downloads.json and is only committed when the count changes;
# CI ignores that path.
on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Compute installer downloads and publish the badge JSON
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          total=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '[.[].assets[] | select(.name != "latest.json") | select(.name | endswith(".sig") | not) | .download_count] | add // 0')
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"Downloads","message":"%s","color":"22c55e"}\n' "$total" > .github/badges/downloads.json
          if git diff --quiet -- .github/badges/downloads.json; then
            echo "count unchanged ($total)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/downloads.json
          git commit -m "chore: downloads badge count $total"
          git pull --rebase origin main
          git push origin main
