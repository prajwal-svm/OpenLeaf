name: Docs

# Build the Starlight docs site from docs/ + website/ and deploy to GitHub Pages.
# Requires Pages to be enabled with source = "GitHub Actions" (Settings -> Pages).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes supersede in-flight builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from the `packageManager` field in the root package.json
      # (matches CI); passing an explicit version conflicts with it.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Install
        working-directory: website
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: website
        run: pnpm build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
