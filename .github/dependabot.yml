# Weekly grouped dependency updates: one PR per ecosystem instead of a PR per
# package. Security updates are separate (enabled repo-side) and open
# immediately regardless of this schedule.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Wait for a release to age before proposing it, so bumps clear pnpm's
    # supply-chain minimum-release-age policy (a just-published version fails
    # `pnpm install --frozen-lockfile` in CI otherwise).
    cooldown:
      default-days: 7
    groups:
      # Only minor+patch are grouped into one safe-to-merge PR. Major bumps
      # (breaking: zod 3->4, typescript 5->7, vite 6->8, etc.) come as separate
      # PRs so they are reviewed and migrated deliberately, never auto-bundled.
      npm-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    groups:
      # Same policy as npm: group only minor+patch; majors (e.g. rand 0.8->0.9
      # removed rand::rngs::OsRng, zip 2->4) get their own reviewable PRs.
      cargo-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-all:
        patterns: ["*"]
    open-pull-requests-limit: 5
